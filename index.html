<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>能源市场新闻Agent</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f7fa; color: #333; line-height: 1.6;
    }
    .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
    header {
      background: linear-gradient(135deg, #1a3a5c 0%, #2d6a9f 100%);
      color: white; padding: 30px; border-radius: 12px; margin-bottom: 30px;
    }
    header h1 { font-size: 2em; margin-bottom: 10px; }
    .stats {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px; margin-bottom: 30px;
    }
    .stat-card {
      background: white; padding: 20px; border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    .stat-card h3 { color: #2d6a9f; font-size: 0.9em; margin-bottom: 10px; }
    .stat-card .value { font-size: 2em; font-weight: bold; }
    .news-list { display: grid; gap: 16px; }
    .news-item {
      background: white; padding: 20px; border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08); border-left: 4px solid #2d6a9f;
    }
    .news-item .title { font-size: 1.1em; font-weight: 600; margin-bottom: 8px; }
    .news-item .title a { color: #333; text-decoration: none; }
    .news-item .title a:hover { color: #2d6a9f; }
    .news-item .summary { color: #666; margin-bottom: 12px; font-size: 0.95em; }
    .news-item .meta { display: flex; gap: 8px; flex-wrap: wrap; font-size: 0.85em; }
    .news-item .meta span { background: #f0f0f0; padding: 3px 10px; border-radius: 4px; }
    .news-item .meta .score { background: #2d6a9f; color: white; }
    .news-item .meta .category { background: #e3f2fd; color: #1565c0; }
    .loading { text-align: center; padding: 40px; color: #666; }
    .error { text-align: center; padding: 40px; color: #999; }
    footer { text-align: center; padding: 40px; color: #999; }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>能源市场新闻Agent</h1>
      <p>原油 · 天然气 · 全球市场 | 每天北京时间 08:00 自动更新</p>
    </header>
    <div id="stats" class="stats"></div>
    <div id="news-list" class="news-list"></div>
    <footer>
      <p>数据来源：Argus, Platts, Reuters, Bloomberg, Yahoo Finance, 隆众资讯等</p>
      <p id="update-time"></p>
    </footer>
  </div>
  <script>
    async function loadNews() {
      const container = document.getElementById('news-list');
      const statsEl = document.getElementById('stats');
      container.innerHTML = '<div class="loading">加载中...</div>';
      try {
        const res = await fetch('data/news.json');
        if (!res.ok) throw new Error('No data');
        const data = await res.json();
        statsEl.innerHTML = `
          <div class="stat-card"><h3>今日新闻</h3><div class="value">${data.summary.total}</div></div>
          <div class="stat-card"><h3>信息来源</h3><div class="value">${Object.keys(data.summary.bySource).length}</div></div>
        `;
        container.innerHTML = data.items.map((item, i) => `
          <div class="news-item">
            <div class="title"><a href="${item.url || '#'}" target="_blank">#${i+1} ${item.title}</a></div>
            <div class="summary">${item.summary || ''}</div>
            <div class="meta">
              <span>${item.source?.displayName || ''}</span>
              <span class="score">重要性 ${item.importance || '-'}</span>
              ${(item.category||[]).map(c => `<span class="category">${c}</span>`).join('')}
            </div>
          </div>
        `).join('');
        document.getElementById('update-time').textContent = '更新: ' + new Date(data.generatedAt).toLocaleString('zh-CN');
      } catch(e) {
        container.innerHTML = '<div class="error">暂无数据，请等待定时任务运行或手动触发 GitHub Action</div>';
      }
    }
    loadNews();
  </script>
</body>
</html>
